<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortuneQuest Pro | AI Financial Mastery</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Global configuration access
        window.FirebaseSDK = { initializeApp, getAuth, signInWithCustomToken, onAuthStateChanged, signOut, getFirestore, doc, setDoc, onSnapshot, updateDoc, collection };
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            initializeApp, getAuth, signInWithCustomToken, 
            onAuthStateChanged, signOut, getFirestore, 
            doc, setDoc, onSnapshot, updateDoc, collection 
        } = window.FirebaseSDK;

        // Configuration from environment or defaults
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {};
        const appId = window.__app_id || 'fortune-quest-pro';
        const apiKey = ""; // Gemini API Key

        // --- Gemini Integration ---
        const callGemini = async (prompt) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (e) { return "AI insight currently unavailable."; }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dash');
            const [aiStrategy, setAiStrategy] = useState("");

            useEffect(() => {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                // Auto-auth with token if present
                if (window.__initial_auth_token) {
                    signInWithCustomToken(auth, window.__initial_auth_token).catch(console.error);
                }

                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        const profileRef = doc(db, 'artifacts', appId, 'users', u.uid, 'profile', 'main');
                        onSnapshot(profileRef, (snap) => {
                            if (snap.exists()) setProfile(snap.data());
                            else {
                                const init = { balance: 0, invested: 0, xp: 0, level: 1 };
                                setDoc(profileRef, init);
                                setProfile(init);
                            }
                            setLoading(false);
                        });
                    } else {
                        setLoading(false);
                    }
                });
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500">Initializing Secure Session...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center p-6 text-center">
                    <div className="glass-panel p-10 rounded-[2.5rem] max-w-md w-full">
                        <div className="text-4xl mb-4">🛡️</div>
                        <h1 className="text-2xl font-black text-white mb-2">Access Restricted</h1>
                        <p className="text-slate-400 text-sm mb-6">This environment requires a secure handshake to initialize.</p>
                        <div className="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl text-blue-400 text-xs font-bold">
                            Please ensure your secure token is active.
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen text-slate-100 p-6 pb-24">
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-xl font-black tracking-tighter">FortuneQuest</h1>
                            <p className="text-[10px] text-blue-500 font-bold tracking-widest uppercase">AI Strategic Mode</p>
                        </div>
                        <div className="w-10 h-10 bg-slate-800 rounded-full border border-slate-700"></div>
                    </header>

                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="glass-panel p-5 rounded-3xl">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Reserves</p>
                            <h2 className="text-2xl font-black">${profile?.balance.toFixed(2)}</h2>
                        </div>
                        <div className="glass-panel p-5 rounded-3xl">
                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Portfolio</p>
                            <h2 className="text-2xl font-black text-emerald-400">${profile?.invested.toFixed(2)}</h2>
                        </div>
                    </div>

                    <div className="flex gap-2 mb-8 bg-slate-900/50 p-1 rounded-2xl">
                        <button onClick={() => setActiveTab('dash')} className={`flex-1 py-3 rounded-xl text-[10px] font-bold ${activeTab === 'dash' ? 'bg-slate-800 text-white' : 'text-slate-500'}`}>DASHBOARD</button>
                        <button onClick={() => setActiveTab('ai')} className={`flex-1 py-3 rounded-xl text-[10px] font-bold ${activeTab === 'ai' ? 'bg-slate-800 text-white' : 'text-slate-500'}`}>✨ STRATEGY</button>
                    </div>

                    {activeTab === 'dash' ? (
                        <div className="space-y-4">
                             <button className="w-full glass-panel p-6 rounded-[2rem] text-left flex justify-between items-center hover:bg-slate-800/50 transition-all">
                                <div>
                                    <p className="font-black">Daily Spare Change</p>
                                    <p className="text-xs text-slate-500 font-medium">Add $10.00 to reserves</p>
                                </div>
                                <span className="text-blue-500 font-black">+XP</span>
                             </button>
                             <div className="p-6 glass-panel rounded-[2rem] border-l-4 border-blue-500">
                                <h3 className="text-xs font-black text-blue-400 uppercase mb-2">AI Tip</h3>
                                <p className="text-sm text-slate-300">Based on your level, you should focus on increasing your Portfolio diversification today.</p>
                             </div>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="glass-panel p-8 rounded-[2.5rem] text-center">
                                <h3 className="text-xl font-black mb-4">✨ AI Wealth Analysis</h3>
                                <button 
                                    onClick={async () => {
                                        setAiStrategy("Analyzing...");
                                        const res = await callGemini("Give me a 3-step wealth plan.");
                                        setAiStrategy(res);
                                    }}
                                    className="w-full py-4 bg-blue-600 rounded-2xl font-black hover:bg-blue-500"
                                >
                                    Generate Plan
                                </button>
                                {aiStrategy && <p className="mt-6 text-sm text-slate-400 text-left leading-relaxed">{aiStrategy}</p>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
